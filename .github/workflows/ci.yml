name: CI - Cross-Platform Build Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Rust Core ──────────────────────────────────────────────────
  rust-build:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/raven-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/raven-core/Cargo.lock') }}

      - name: Build Rust core (release)
        working-directory: rust/raven-core
        run: cargo build --release

      - name: Run Rust tests
        working-directory: rust/raven-core
        run: cargo test --release

      - name: Upload Rust library artifact
        uses: actions/upload-artifact@v4
        with:
          name: raven-core-${{ runner.os }}
          path: |
            rust/raven-core/target/release/libraven_core.a
            rust/raven-core/target/release/raven_core.lib

  # ── Swift Framework (Windows) ──────────────────────────────────
  swift-windows:
    name: Swift (Windows)
    runs-on: windows-latest
    needs: rust-build
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift
        uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-6.1-release
          tag: 6.1-RELEASE

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.1.1
        with:
          version: latest
          cache: true

      - name: Download Rust library
        uses: actions/download-artifact@v4
        with:
          name: raven-core-Windows
          path: rust/raven-core/target/release

      - name: Build Swift framework
        run: swift build
        env:
          VULKAN_SDK: ${{ env.VULKAN_SDK }}

      - name: Run Swift tests
        run: swift test
        env:
          VULKAN_SDK: ${{ env.VULKAN_SDK }}

  # ── Swift Framework (macOS) ────────────────────────────────────
  swift-macos:
    name: Swift (macOS)
    runs-on: macos-latest
    needs: rust-build
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install vulkan-loader vulkan-headers molten-vk sdl3

      - name: Download Rust library
        uses: actions/download-artifact@v4
        with:
          name: raven-core-macOS
          path: rust/raven-core/target/release

      - name: Build Swift framework
        run: swift build

      - name: Run Swift tests
        run: swift test

  # ── Swift Framework (Linux) ────────────────────────────────────
  swift-linux:
    name: Swift (Linux)
    runs-on: ubuntu-latest
    needs: rust-build
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev vulkan-tools libsdl3-dev

      - name: Download Rust library
        uses: actions/download-artifact@v4
        with:
          name: raven-core-Linux
          path: rust/raven-core/target/release

      - name: Build Swift framework
        run: swift build

      - name: Run Swift tests
        run: swift test
